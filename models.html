<!-- Models Overview Section -->
<section id="models" class="content-section">
    <div class="header-section">
        <h2>🏎️ BMW Models Analysis</h2>
        <div class="filter-group">
            <label>Year:</label>
            <select id="yearFilter" class="filter-select">
                <option value="">All Years</option>
            </select>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-icon">📊</span>
            <h3>Total Models</h3>
            <p class="stat-value" id="modelsCount">0</p>
        </div>
        <div class="stat-card">
            <span class="stat-icon">🏆</span>
            <h3>Top Model</h3>
            <p class="stat-value" id="topModel">-</p>
        </div>
        <div class="stat-card">
            <span class="stat-icon">💰</span>
            <h3>Avg Price</h3>
            <p class="stat-value" id="modelsAvgPrice">$0</p>
        </div>
        <div class="stat-card">
            <span class="stat-icon">📈</span>
            <h3>Total Sales</h3>
            <p class="stat-value" id="modelsTotalSales">0</p>
        </div>
    </div>

    <div class="charts-row">
        <div class="chart-container full-width">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
                <h3 style="margin: 0;">Top 5 Models by Sales</h3>
                <span style="background: var(--primary-blue); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem;">Bar</span>
            </div>
            <canvas id="topModelsChart"></canvas>
        </div>
    </div>

    <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Models Showcase</h3>
    <div class="models-grid" id="modelsGrid">
        <!-- Models will be populated dynamically -->
    </div>

    <div class="table-container" style="margin-top: 2rem;">
        <h3 style="padding: 1rem 1.5rem 0; margin: 0;">All Models Details</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Model Name</th>
                    <th>Sales Volume</th>
                    <th>Total Revenue</th>
                    <th>Avg Price</th>
                    <th>Records</th>
                    <th>Avg Mileage</th>
                </tr>
            </thead>
            <tbody id="modelsTableBody">
                <!-- Table rows will be populated dynamically -->
            </tbody>
        </table>
    </div>
</section>
