<!-- Regions Analysis Section -->
<section id="regions" class="content-section">
    <div class="header-section">
        <h2>🗺️ Regional Performance</h2>
        <div class="filter-group">
            <label>Year:</label>
            <select id="yearFilter" class="filter-select">
                <option value="">All Years</option>
            </select>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-icon">🌍</span>
            <h3>Total Regions</h3>
            <p class="stat-value" id="regionsCount">0</p>
        </div>
        <div class="stat-card">
            <span class="stat-icon">📊</span>
            <h3>Top Region</h3>
            <p class="stat-value" id="topRegion">-</p>
        </div>
        <div class="stat-card">
            <span class="stat-icon">💰</span>
            <h3>Total Revenue</h3>
            <p class="stat-value" id="regionsRevenue">$0</p>
        </div>
        <div class="stat-card">
            <span class="stat-icon">📈</span>
            <h3>Avg Sales/Region</h3>
            <p class="stat-value" id="regionsAvgSales">0</p>
        </div>
    </div>

    <div class="charts-row">
        <div class="chart-container full-width">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
                <h3 style="margin: 0;">Sales by Region</h3>
                <span style="background: var(--primary-blue); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem;">Bar</span>
            </div>
            <canvas id="salesByRegionChart"></canvas>
        </div>
    </div>

    <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Regional Breakdown</h3>
    <div class="regions-grid" id="regionsGrid">
        <!-- Regions will be populated dynamically -->
    </div>

    <div class="table-container" style="margin-top: 2rem;">
        <h3 style="padding: 1rem 1.5rem 0; margin: 0;">Regional Statistics</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Region</th>
                    <th>Total Sales</th>
                    <th>Total Revenue</th>
                    <th>Records</th>
                    <th>Avg Price</th>
                    <th>Market Share %</th>
                </tr>
            </thead>
            <tbody id="regionsTableBody">
                <!-- Table rows will be populated dynamically -->
            </tbody>
        </table>
    </div>
</section>
